interface:
  display_name: "Academic Topic Research Agent"
  short_description: "中文默认的学术选题前置调研开发包：三档文献元数据、v2 风格 Markdown/LaTeX/PDF 报告、标题/摘要候选、数据可行性 (Pass/Weak Pass/Fail)。触发词：选题报告、开题报告、前期调研、调研开发、研究方向、学术选题。"
  default_prompt: "Use $academic-topic-research-agent to develop my research idea into a Chinese v2-style pre-research package. First ask me for any missing core fields (主题 / 目标 venue / 深度 / 数据类型), then run literature metadata at the chosen depth, check dataset/study feasibility, polish titles and abstracts, and produce Markdown/LaTeX/PDF report artifacts."

policy:
  allow_implicit_invocation: true

