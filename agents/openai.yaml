interface:
  display_name: "Academic Topic Research Agent"
  short_description: "中文默认的学术选题前置调研开发包：三档文献元数据、v2 风格 Markdown/LaTeX/PDF 报告、标题/摘要候选、数据可行性 (Pass/Weak Pass/Fail)，含 researcher-grade（CHI/CSCW 级）构念压力测试 + 8 角批评-重写循环 + venue fit 决策。触发词：选题报告、开题报告、前期调研、调研开发、研究方向、学术选题、researcher-grade、深度打磨、构念压力测试、CHI 级、CSCW 转身、期刊投稿级。"
  default_prompt: "使用 $academic-topic-research-agent 把我的研究想法做成中文 v2 风格的前期调研报告。**所有最终产出默认用中文写**（论文 / 会议 / 期刊名 + 关键技术术语保留英文）。流程：(1) 如果我没给齐 4 个核心字段（主题 / 目标 venue / 深度 / 数据类型），用 ask_user_question 工具一次性问完（4 题以内），不要分多轮；如果已经给齐就直接开始，不要再问。(2) 按选定深度跑文献元数据。(3) 检查数据 / 研究可行性。(4) 打磨标题和摘要。(5) 产出 Markdown / LaTeX / PDF 报告工件。Researcher-grade 模式触发词：'researcher-grade' / '深度打磨' / '构念压力测试' / 'CHI 级' / 'CSCW 转身' / '期刊投稿级'，deep 深度自动开启；触发后跑 Module H（构念压力测试 + 8 角批评-重写 deep=2 轮 / standard=1 轮）+ venue fit 决策 + 14 元素 researcher-grade 结构。**关键约束**：intake 满足后**完整跑完所有 module 再返回**，中途不要等用户确认；如果上一轮已经问过 intake，本轮收到答案后立即写 topic_input.yaml、汇总 2-3 行、然后启动 Module B，**不要重新进入 intake**。"

policy:
  allow_implicit_invocation: true

